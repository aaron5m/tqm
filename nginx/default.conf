server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri /index.html =404;
    }

    # Node backend 
    location /api/ {
        proxy_pass http://node:3000/api/;     
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Python backend
    location /pyapi/ {
        proxy_pass http://fastapi:8000/pyapi/;     
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
