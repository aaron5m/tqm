services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_PASS_URL: ${VITE_PASS_URL}
    environment:
      VITE_PASS_URL: ${VITE_PASS_URL}
    ports:
      - 5173:5173
    depends_on:
      - node
    volumes:
      - vite_dist:/app/dist
      - ./html:/app/web_pages
      #- /app/node_modules
    command: sh -c "npm run build && chmod -R 777 /app/dist && touch /app/dist/.build_complete"

  node:
    build: ./node
    depends_on:
      - fastapi
    environment:
      - FASTAPI_URL=http://fastapi:8000
      - JWT_SECRET=${JWT_SECRET}
      - API_SECRET=${API_SECRET}
    networks:
      - backend
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./node:/app
      - ./html/images:/app/html_images
      - ./frontend/public/images:/app/frontend_public_images
      - /app/node_modules
    env_file:
      - .env

  sync:
    image: alpine
    depends_on:
      - frontend
    volumes:
      - vite_dist:/app/dist
      - ./html:/app/web_pages
      - ./html/images:/app/html_images
      - ./frontend/public/images:/app/frontend_public_images
    # command: sh -c "rm -rf /app/web_pages/assets /app/web_pages/index.html; mkdir -p /app/web_pages; cp -Rpu /app/dist/* /app/web_pages/; cp -Rpn /app/frontend_public_images/* /app/html_images/"
    command: >
      sh -c '
      while [ ! -f /app/dist/.build_complete ]; do
        echo "Waiting for frontend build to complete...";
        sleep 1;
      done;
      rm -rf /app/web_pages/assets /app/web_pages/index.html;
      mkdir -p /app/web_pages /app/web_pages/assets;
      cp -R /app/dist/assets/* /app/web_pages/assets/;
      cp /app/dist/index.html /app/web_pages/index.html;
      cp -Rpn /app/frontend_public_images/* /app/html_images/;
      '

  fastapi:
    build: ./fastapi
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - API_SECRET=${API_SECRET}
    networks:
      - backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./fastapi:/app
      - fastapi_venv:/app/.venv

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:            
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

volumes:
  vite_dist:
  postgres_data:
  fastapi_venv:

networks:
  backend: