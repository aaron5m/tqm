version: "3"

services:
  node:
    build: ./node
    depends_on:
      - fastapi
    environment:
      FASTAPI_URL: http://fastapi:8000
    networks:
      - backend

  fastapi:
    build: ./fastapi
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/taqm
    networks:
      - backend

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend: